name: Daily Weather Bot

on:
  schedule:
    # ~6:30 ora italiana, randomizzato per evitare picchi di carico GitHub
    # Minuti tra 25-40 → 5:25–5:40 UTC
    # → Inverno (CET/UTC+1): ~6:25–6:40 IT
    # → Estate (CEST/UTC+2): ~7:25–7:40 IT
    - cron: '25-40/5 5 * * *'   # ogni 5 minuti nel range 25-40 → 25,30,35,40
    # Allternativa più sparsa (se vuoi ancora meno collisioni):
    # - cron: '27,32,38 5 * * *'   # solo 3 slot fissi random-ish
  workflow_dispatch:  # per test manuale immediato

jobs:
  send_weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt non trovato → salto installazione pacchetti extra"
          fi

      - name: Run weather bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py force
