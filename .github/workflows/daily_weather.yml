name: Daily Weather Bot

on:
  schedule:
    - cron: '30 7 * * *'   # Fisso alle 7:30 UTC ogni giorno
                           # → 8:30 ora italiana in inverno (CET)
                           # → 9:30 ora italiana in estate (CEST)
  workflow_dispatch:       # Per test manuali immediati

jobs:
  send_weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt non trovato → salto installazione pacchetti extra"
          fi

      - name: Run weather bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py force
