name: Daily Weather Bot

on:
  schedule:
    # ~8:00 ora italiana (7:00 UTC tutto l'anno)
    # → 8:00 CET (inverno), 9:00 CEST (estate)
    - cron: '0 7 * * *'
  workflow_dispatch:  # per lanciare manualmente quando vuoi

jobs:
  send_weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # versione moderna e stabile

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt non trovato, salto installazione pacchetti"
          fi

      - name: Run weather bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py force
